name: CI

on: [push, pull_request]

jobs:
  testbenches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog
      - name: tff
        run: make -C tff
      - name: count_clock
        run: make -C count_clock
      - name: fsm_hdlc
        run: make -C fsm_hdlc
